<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dar Cafeteria favicon.

  Single source of truth for the brand mark — the Font Awesome 6.5
  `fa-utensils` glyph (the same icon the admin panel's <i.fa-solid.fa-utensils>
  renders) on the warm sunset gradient used by AppGradient.Primary.

  64×64 viewport. The FA glyph is 448×512; we scale it 0.064× and centre
  it on the tile so it occupies ≈45% of the icon width — same proportion
  the admin panel sidebar logo uses. White fill matches the launcher
  foreground and the notification status-bar icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="dc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#F8C273"/>
      <stop offset="50%" stop-color="#E07A45"/>
      <stop offset="100%" stop-color="#A0481E"/>
    </linearGradient>
  </defs>

  <!-- Rounded background tile -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#dc-bg)"/>

  <!-- Font Awesome Free 6.5.2 utensils glyph, white, centred.
       width  = 448 * 0.064 = 28.7  →  tx = (64 − 28.7) / 2 = 17.65
       height = 512 * 0.064 = 32.8  →  ty = (64 − 32.8) / 2 = 15.6 -->
  <g transform="translate(17.65 15.6) scale(0.064)" fill="#FFFFFF">
    <path d="M416 0C400 0 288 32 288 176V288c0 35.3 28.7 64 64 64h32V480c0 17.7 14.3 32 32 32s32-14.3 32-32V352 240 32c0-17.7-14.3-32-32-32zM64 16C64 7.8 57.9 1 49.7 .1S34.2 4.6 32.4 12.5L2.1 148.8C.7 155.1 0 161.5 0 167.9c0 45.9 35.1 83.6 80 87.7V480c0 17.7 14.3 32 32 32s32-14.3 32-32V255.6c44.9-4.1 80-41.8 80-87.7c0-6.4-.7-12.8-2.1-19.1L191.6 12.5c-1.8-8-9.3-13.3-17.4-12.4S160 7.8 160 16V150.2c0 5.4-4.4 9.8-9.8 9.8c-5.1 0-9.3-3.9-9.8-9L127.9 14.6C127.2 6.3 120.3 0 112 0s-15.2 6.3-15.9 14.6L83.7 151c-.5 5.1-4.7 9-9.8 9c-5.4 0-9.8-4.4-9.8-9.8V16zm48.3 152l-.3 0-.3 0 .3-.7 .3 .7z"/>
  </g>
</svg>
